<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Page</title>
</head>
<body>

<input type="text" id="myInput">
<button id="showPW">Hide Input</button>
<div id="name_iD">Name Element</div>
<div id="output"></div>

<script>
  let name = document.getElementById('name_iD');
  let showPW = document.getElementById('showPW');

  function saveValue() {
    var input = document.getElementById("myInput").value;
    if (input.trim() !== "") {
      document.getElementById("output").innerText = input;
    } else {
      name.style.display = 'none';
    }
  }

  showPW.addEventListener('click', function () {
    name.style.display = 'none';
  });

  document.getElementById("myInput").addEventListener('input', saveValue);
</script>

</body>
</html>
